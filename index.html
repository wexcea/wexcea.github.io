<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wexcea - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@300;400;600;700&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --background-blur: 2px;
            --background-type: 'video';
            --background-url: 'https://i.pinimg.com/1200x/10/77/61/107761414d06c715eaeaafae60f85025.jpg';
            --video-url: 'https://raw.githubusercontent.com/wexcea/rbx-scripts/main/assets/Background-video.mp4';
            --youtube-url: '';

            --primary:   #9ca3af;
            --secondary: #6b7280;
            --light:     #e2e8f0;
            --dark:      #374151;
            --accent:    #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Background ─────────────────────────────── */
        .background-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1; overflow: hidden;
        }

        .background-image, .background-video, .background-youtube {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(var(--background-blur));
            opacity: 0.25;
            display: none;
        }

        .background-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg,
                rgba(148, 163, 184, 0.12),
                rgba(71, 85, 105, 0.18),
                rgba(0, 0, 0, 0.88));
        }

        /* ── Loading screen ──────────────────────────── */
        .loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }

        .loading-dots { display: flex; gap: 8px; margin-bottom: 20px; }

        .loading-dot {
            width: 12px; height: 12px;
            background: var(--light);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.3s; }
        .loading-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        .loading-text {
            font-family: 'Space Grotesk', 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 18px;
            color: var(--light);
            font-weight: 500;
            letter-spacing: 2px;
        }

        .loading-screen.hidden { opacity: 0; visibility: hidden; }

        /* ── Layout ──────────────────────────────────── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .main-content {
            min-height: 100vh; padding: 60px 0;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Hero title ──────────────────────────────── */
        .hero-title {
            font-family: 'Outfit', 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            text-align: center;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(45deg, var(--dark), var(--primary), var(--light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: -2px;
            display: flex; align-items: center;
            justify-content: center; gap: 20px; flex-wrap: wrap;
        }

        .hero-logo {
            width: clamp(70px, 11vw, 110px);
            height: clamp(70px, 11vw, 110px);
            border-radius: 50%;
            border: 3px solid var(--light);
            box-shadow: 0 0 24px rgba(203, 213, 225, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            object-fit: cover;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 18px rgba(148, 163, 184, 0.55)); }
            to   { filter: drop-shadow(0 0 32px rgba(203, 213, 225, 0.85)); }
        }

        /* ── Hero wrapper ────────────────────────────── */
        .hero-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding-top: 20px;
            margin-bottom: 0;
        }

        /* ── Game badges row ─────────────────────────── */
        .game-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .game-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 10px;
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--light);
            cursor: default;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .game-badge:hover {
            background: rgba(148, 163, 184, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(148, 163, 184, 0.2);
        }

        .game-badge img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex-shrink: 0;
            filter: grayscale(30%) brightness(0.9);
        }

        @media (max-width: 400px) {
            .game-badge {
                padding: 5px 9px;
                font-size: 0.72rem;
                gap: 5px;
            }
            .game-badge img {
                width: 15px;
                height: 15px;
            }
            .game-badges { gap: 6px; }
        }

        /* ── Social icons ────────────────────────────── */
        .social-links {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; margin-bottom: 15px; margin-top: 0;
        }

        .social-icon {
            width: 50px; height: 50px;
            background: rgba(148, 163, 184, 0.08);
            border: 2px solid rgba(148, 163, 184, 0.28);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer; text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(148, 163, 184, 0.18);
            border-color: var(--light);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(148, 163, 184, 0.35);
        }

        .social-icon svg {
            width: 24px; height: 24px;
            fill: var(--light);
        }

        /* ── Search ──────────────────────────────────── */
        .search-container {
            max-width: 700px; margin: 15px auto 15px;
            position: relative;
        }

        .search-box {
            width: 100%;
            background: rgba(148, 163, 184, 0.06);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(148, 163, 184, 0.22);
            border-radius: 50px;
            padding: 18px 60px 18px 25px;
            font-family: 'Inter', 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 16px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder { color: rgba(255, 255, 255, 0.4); }

        .search-box:focus {
            border-color: var(--light);
            box-shadow: 0 0 22px rgba(148, 163, 184, 0.28);
        }

        .search-icon {
            position: absolute; right: 25px; top: 50%;
            transform: translateY(-50%);
            width: 24px; height: 24px;
            pointer-events: none;
        }

        .search-icon svg { width: 100%; height: 100%; fill: var(--primary); }

        /* ── Script grid ─────────────────────────────── */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; margin-top: 30px;
        }

        .script-card {
            background: rgba(148, 163, 184, 0.06);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(148, 163, 184, 0.20);
            padding: 20px;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease;
            cursor: pointer; position: relative; overflow: hidden;
        }

        .script-card::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(203, 213, 225, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .script-card:hover::before { left: 100%; }

        .script-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 32px rgba(148, 163, 184, 0.22);
            border-color: var(--light);
            background: rgba(148, 163, 184, 0.10);
        }

        .script-logo {
            width: 70px; height: 70px;
            border-radius: 15px; object-fit: cover;
            border: 2px solid rgba(148, 163, 184, 0.28);
            flex-shrink: 0; transition: all 0.3s ease;
        }

        .script-card:hover .script-logo {
            border-color: var(--light);
            box-shadow: 0 0 16px rgba(203, 213, 225, 0.45);
        }

        .script-info { flex: 1; min-width: 0; }

        .script-name {
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 1.1rem; font-weight: 600;
            color: var(--light);
            margin-bottom: 5px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .script-description {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* ── Arrow button ────────────────────────────── */
        .arrow-button {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--dark), var(--secondary));
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(148, 163, 184, 0.25);
            flex-shrink: 0; position: relative; overflow: hidden;
        }

        .arrow-button::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .arrow-button:hover::before { left: 100%; }

        .arrow-button svg {
            width: 20px; height: 20px;
            fill: white; transition: transform 0.3s ease;
        }

        .arrow-button:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            box-shadow: 0 6px 26px rgba(148, 163, 184, 0.45);
        }

        .arrow-button:hover svg { transform: translateX(3px); }
        .arrow-button:active   { transform: scale(1.05); }

        /* ── No results ──────────────────────────────── */
        .no-results {
            text-align: center; padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 1.2rem;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 768px) {
            .container    { padding: 0 15px; }
            .main-content { padding: 40px 0; }
            .social-icon  { width: 45px; height: 45px; }
            .social-icon svg { width: 20px; height: 20px; }
            .scripts-grid { grid-template-columns: 1fr; gap: 20px; }
            .script-card  { padding: 15px; }
            .script-logo  { width: 60px; height: 60px; border-radius: 12px; }
            .script-name  { font-size: 0.95rem; }
            .script-description { font-size: 0.75rem; }
            .arrow-button { width: 40px; height: 40px; }
            .arrow-button svg { width: 18px; height: 18px; }
            .search-box   { padding: 15px 50px 15px 20px; font-size: 14px; }
            .search-icon  { width: 20px; height: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="background-container">
        <img id="backgroundImage" class="background-image" src="" alt="Background">
        <video id="backgroundVideo" class="background-video" autoplay muted loop playsinline>
            <source src="" type="video/mp4">
        </video>
        <iframe id="backgroundYoutube" class="background-youtube" src="" frameborder="0"
            allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="background-overlay"></div>
    </div>

    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <div class="loading-text">กำลังโหลด...</div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="container">

            <div class="hero-wrapper">
                <h1 class="hero-title">
                    <img src="https://raw.githubusercontent.com/wexcea/rbx-scripts/refs/heads/main/assets/Logo-Tittle.png"
                         alt="Wexcea Logo" class="hero-logo">
                    Wexcea
                </h1>

                <div class="game-badges">
                    <div class="game-badge">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/31/Free_Fire_Logo.png/220px-Free_Fire_Logo.png" alt="Free Fire">
                        Free Fire
                    </div>
                    <div class="game-badge">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Roblox_player_icon_black.svg/1200px-Roblox_player_icon_black.svg.png" alt="Roblox" style="filter: grayscale(100%) invert(1) brightness(0.75);">
                        Roblox
                    </div>
                    <div class="game-badge">
                        <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png" alt="Minecraft">
                        Minecraft
                    </div>
                </div>
            </div>

            <div style="margin-top: 40px;"></div>

            <div class="scripts-grid" id="scriptsGrid"></div>
            <div class="no-results" id="noResults" style="display: none;">ไม่พบรายการ</div>

        </div>
    </div>

    <script>
        const scripts = [
            {
                id: 1,
                name: "Donate Link",
                description: "โดเนทตรงนี้ได้เลยนะครับ",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/Donate-logo.gif",
                url: "https://easydonate.app/wexcea"
            },
            {
                id: 2,
                name: "Wexcea Shop",
                description: "ดิสร้านผมเองครับ (เน้นโปรแกรม)",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/discord-logo.png",
                url: "https://discord.gg/6Vv8e3YSU3"
            },
            {
                id: 3,
                name: "My Facebook",
                description: "ติดต่องานตรงนี้เลยครับ",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/facebook-logo.png",
                url: "https://www.facebook.com/share/14cf7G1rtvh/"
            }
        ];

        function getYouTubeEmbedUrl(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}?autoplay=1&mute=1&loop=1&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&playlist=${match[2]}`;
            }
            return null;
        }

        function initBackground() {
            const style = getComputedStyle(document.documentElement);
            const backgroundType = style.getPropertyValue('--background-type').replace(/['"]/g, '');
            const backgroundUrl  = style.getPropertyValue('--background-url').replace(/['"]/g, '');
            const videoUrl       = style.getPropertyValue('--video-url').replace(/['"]/g, '');
            const youtubeUrl     = style.getPropertyValue('--youtube-url').replace(/['"]/g, '');
            setBackground(
                backgroundType,
                backgroundType === 'youtube' ? youtubeUrl :
                backgroundType === 'video'   ? videoUrl   : backgroundUrl
            );
        }

        function setBackground(type, url) {
            const img = document.getElementById('backgroundImage');
            const vid = document.getElementById('backgroundVideo');
            const yt  = document.getElementById('backgroundYoutube');
            img.style.display = 'none';
            vid.style.display = 'none';
            yt.style.display  = 'none';
            if (type === 'youtube') {
                const embedUrl = getYouTubeEmbedUrl(url);
                if (embedUrl) { yt.style.display = 'block'; yt.src = embedUrl; }
                else { img.style.display = 'block'; img.src = getComputedStyle(document.documentElement).getPropertyValue('--background-url').replace(/['"]/g, ''); }
            } else if (type === 'video') {
                vid.style.display = 'block';
                vid.src = url; vid.loop = true; vid.muted = true; vid.autoplay = true; vid.playsInline = true;
            } else {
                img.style.display = 'block'; img.src = url;
            }
        }

        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2000);
        }

        function renderScripts(list) {
            const grid      = document.getElementById('scriptsGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML  = '';
            if (list.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            list.forEach(script => {
                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <img src="${script.logo}" alt="${script.name}" class="script-logo">
                    <div class="script-info">
                        <div class="script-name">${script.name}</div>
                        <div class="script-description">${script.description}</div>
                    </div>
                    <button class="arrow-button" onclick="viewScript(${script.id})">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                            <path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/>
                        </svg>
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function viewScript(id) {
            const script = scripts.find(s => s.id === id);
            if (script && script.url) window.location.href = script.url;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initBackground();
            hideLoading();
            renderScripts(scripts);
        });
    </script>
</body>
</html>
