<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wexcea - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@300;400;600;700&family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --background-blur: 2px;
            --background-type: 'video';
            --background-url: 'https://i.pinimg.com/1200x/10/77/61/107761414d06c715eaeaafae60f85025.jpg';
            --video-url: 'https://raw.githubusercontent.com/wexcea/rbx-scripts/main/assets/Background-video.mp4';
            --youtube-url: '';

            --primary:   #9ca3af;
            --secondary: #6b7280;
            --light:     #e2e8f0;
            --dark:      #374151;
            --accent:    #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Background ─────────────────────────────── */
        .background-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1; overflow: hidden;
        }

        .background-image, .background-video, .background-youtube {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(var(--background-blur));
            opacity: 0.25;
            display: none;
        }

        .background-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg,
                rgba(148, 163, 184, 0.12),
                rgba(71, 85, 105, 0.18),
                rgba(0, 0, 0, 0.88));
        }

        /* ── Loading screen ──────────────────────────── */
        .loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }

        .loading-dots { display: flex; gap: 8px; margin-bottom: 20px; }

        .loading-dot {
            width: 12px; height: 12px;
            background: var(--light);
            border-radius: 50%;
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.3s; }
        .loading-dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        .loading-text {
            font-family: 'Space Grotesk', 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 18px;
            color: var(--light);
            font-weight: 500;
            letter-spacing: 2px;
        }

        .loading-screen.hidden { opacity: 0; visibility: hidden; }

        /* ── Layout ──────────────────────────────────── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .main-content {
            min-height: 100vh; padding: 30px 0;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Hero title ──────────────────────────────── */
        .hero-title {
            font-family: 'Outfit', 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            text-align: center;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(45deg, var(--dark), var(--primary), var(--light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: -2px;
            display: flex; align-items: center;
            justify-content: center; gap: 20px; flex-wrap: wrap;
        }

        .hero-logo {
            width: clamp(70px, 11vw, 110px);
            height: clamp(70px, 11vw, 110px);
            border-radius: 50%;
            border: 3px solid var(--light);
            box-shadow: 0 0 24px rgba(203, 213, 225, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            object-fit: cover;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 18px rgba(148, 163, 184, 0.55)); }
            to   { filter: drop-shadow(0 0 32px rgba(203, 213, 225, 0.85)); }
        }

        /* ── Hero wrapper ────────────────────────────── */
        .hero-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding-top: 0;
            margin-bottom: 0;
        }

        /* ── Game badges row ─────────────────────────── */
        .game-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }

        .game-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 10px;
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--light);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .game-badge:hover {
            background: rgba(148, 163, 184, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(148, 163, 184, 0.2);
        }

        .game-badge img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex-shrink: 0;
            filter: grayscale(30%) brightness(0.9);
        }

        @media (max-width: 400px) {
            .game-badge {
                padding: 5px 9px;
                font-size: 0.72rem;
                gap: 5px;
            }
            .game-badge img {
                width: 15px;
                height: 15px;
            }
            .game-badges { gap: 6px; }
        }

        /* ── Social icons ────────────────────────────── */
        .social-links {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; margin-bottom: 15px; margin-top: 0;
        }

        .social-icon {
            width: 50px; height: 50px;
            background: rgba(148, 163, 184, 0.08);
            border: 2px solid rgba(148, 163, 184, 0.28);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer; text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(148, 163, 184, 0.18);
            border-color: var(--light);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(148, 163, 184, 0.35);
        }

        .social-icon svg {
            width: 24px; height: 24px;
            fill: var(--light);
        }

        /* ── Search ──────────────────────────────────── */
        .search-container {
            max-width: 700px; margin: 15px auto 15px;
            position: relative;
        }

        .search-box {
            width: 100%;
            background: rgba(148, 163, 184, 0.06);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(148, 163, 184, 0.22);
            border-radius: 50px;
            padding: 18px 60px 18px 25px;
            font-family: 'Inter', 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 16px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder { color: rgba(255, 255, 255, 0.4); }

        .search-box:focus {
            border-color: var(--light);
            box-shadow: 0 0 22px rgba(148, 163, 184, 0.28);
        }

        .search-icon {
            position: absolute; right: 25px; top: 50%;
            transform: translateY(-50%);
            width: 24px; height: 24px;
            pointer-events: none;
        }

        .search-icon svg { width: 100%; height: 100%; fill: var(--primary); }

        /* ── Script grid ─────────────────────────────── */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; margin-top: 30px;
        }

        .script-card {
            background: rgba(148, 163, 184, 0.06);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(148, 163, 184, 0.20);
            padding: 20px;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease;
            cursor: pointer; position: relative; overflow: hidden;
        }

        .script-card::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(203, 213, 225, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .script-card:hover::before { left: 100%; }

        .script-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 32px rgba(148, 163, 184, 0.22);
            border-color: var(--light);
            background: rgba(148, 163, 184, 0.10);
        }

        .script-logo {
            width: 70px; height: 70px;
            border-radius: 15px; object-fit: cover;
            border: 2px solid rgba(148, 163, 184, 0.28);
            flex-shrink: 0; transition: all 0.3s ease;
        }

        .script-card:hover .script-logo {
            border-color: var(--light);
            box-shadow: 0 0 16px rgba(203, 213, 225, 0.45);
        }

        .script-info { flex: 1; min-width: 0; }

        .script-name {
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 1.1rem; font-weight: 600;
            color: var(--light);
            margin-bottom: 5px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .script-description {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* ── Arrow button ────────────────────────────── */
        .arrow-button {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--dark), var(--secondary));
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(148, 163, 184, 0.25);
            flex-shrink: 0; position: relative; overflow: hidden;
        }

        .arrow-button::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .arrow-button:hover::before { left: 100%; }

        .arrow-button svg {
            width: 20px; height: 20px;
            fill: white; transition: transform 0.3s ease;
        }

        .arrow-button:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            box-shadow: 0 6px 26px rgba(148, 163, 184, 0.45);
        }

        .arrow-button:hover svg { transform: translateX(3px); }
        .arrow-button:active   { transform: scale(1.05); }

        /* ── No results ──────────────────────────────── */
        .no-results {
            text-align: center; padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif;
            font-size: 1.2rem;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 768px) {
            .container    { padding: 0 15px; }
            .main-content { padding: 40px 0; }
            .social-icon  { width: 45px; height: 45px; }
            .social-icon svg { width: 20px; height: 20px; }
            .scripts-grid { grid-template-columns: 1fr; gap: 20px; }
            .script-card  { padding: 15px; }
            .script-logo  { width: 60px; height: 60px; border-radius: 12px; }
            .script-name  { font-size: 0.95rem; }
            .script-description { font-size: 0.75rem; }
            .arrow-button { width: 40px; height: 40px; }
            .arrow-button svg { width: 18px; height: 18px; }
            .search-box   { padding: 15px 50px 15px 20px; font-size: 14px; }
            .search-icon  { width: 20px; height: 20px; right: 20px; }
        }
        /* ── Popup modal ─────────────────────────────── */
        .popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .popup-overlay.active {
            opacity: 1; visibility: visible;
        }
        .popup-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 20px;
            padding: 32px 28px 28px;
            width: min(340px, 88vw);
            text-align: center;
            position: relative;
            transform: scale(0.88) translateY(20px);
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .popup-overlay.active .popup-card {
            transform: scale(1) translateY(0);
        }
        .popup-close {
            position: absolute; top: 14px; right: 16px;
            background: rgba(148,163,184,0.1);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 50%;
            width: 30px; height: 30px;
            color: var(--primary); font-size: 0.75rem;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .popup-close:hover {
            background: rgba(148,163,184,0.22);
            color: var(--light);
        }
        .popup-icon-wrap {
            width: 64px; height: 64px;
            margin: 0 auto 14px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(148,163,184,0.3);
            box-shadow: 0 0 20px rgba(148,163,184,0.2);
        }
        .popup-icon-wrap img {
            width: 100%; height: 100%; object-fit: contain;
        }
        .popup-game-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem; font-weight: 700;
            color: var(--light);
            margin-bottom: 16px;
        }
        .popup-body {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.8;
        }
        .popup-body .popup-row {
            display: flex; flex-direction: column;
            gap: 2px; margin-bottom: 10px;
        }
        .popup-body .popup-label {
            font-size: 0.72rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Space Grotesk', sans-serif;
        }
        .popup-body .popup-value {
            font-size: 1rem;
            color: var(--light);
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
        }
        .popup-body .popup-note {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.55);
            margin-top: 8px;
        }
        /* ── TikTok step popup ───────────────────────── */
        .tiktok-warning {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.50);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .tiktok-warning.active {
            opacity: 1; visibility: visible;
            pointer-events: all;
        }

        /* ลูกศรแดงชี้มุมขวาบน — independent fixed */
        .tk-arrow {
            position: fixed;
            top: 36px;
            right: 10px;
            z-index: 100001;
            display: none;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            animation: arrowBounce 0.65s ease-in-out infinite alternate;
            pointer-events: none;
            max-width: calc(100vw - 16px);
        }
        .tk-arrow.visible { display: flex; }

        .tk-arrow-text {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.84rem;
            font-weight: 700;
            color: #ffffff;
            text-align: right;
            line-height: 1.55;
            background: rgba(0,0,0,0.88);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 8px 12px;
            border-radius: 10px;
            flex-shrink: 1;
        }

        .tk-arrow svg {
            width: 52px; height: 80px;
            filter: drop-shadow(0 0 10px rgba(239,68,68,1));
            flex-shrink: 0;
        }

        @keyframes arrowBounce {
            from { transform: translateY(2px); }
            to   { transform: translateY(-12px); }
        }

        .tk-card {
            background: rgba(28, 28, 30, 0.78);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-radius: 22px;
            width: min(370px, 92vw);
            max-height: 86vh;
            overflow-y: auto;
            box-shadow: 0 24px 70px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.13);
        }
        .tk-card::-webkit-scrollbar { width: 4px; }
        .tk-card::-webkit-scrollbar-track { background: transparent; }
        .tk-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .tk-header {
            padding: 20px 20px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 12px;
        }
        .tk-tiktok-icon {
            width: 44px; height: 44px; flex-shrink: 0;
            border-radius: 12px; overflow: hidden;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .tk-tiktok-icon img { width: 28px; height: 28px; object-fit: contain; }
        .tk-header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem; font-weight: 700;
            color: #ffffff; margin-bottom: 3px;
        }
        .tk-header-sub {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.78rem; color: rgba(255,255,255,0.45);
            line-height: 1.4;
        }

        .tk-body { padding: 16px 20px 20px; }

        .tk-desc {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.87rem; color: rgba(255,255,255,0.6);
            margin-bottom: 14px; line-height: 1.65;
        }

        .tk-steps { display: flex; flex-direction: column; gap: 14px; }
        .tk-step { display: flex; gap: 12px; align-items: flex-start; }

        .tk-step-num {
            width: 26px; height: 26px; flex-shrink: 0;
            background: rgba(148,163,184,0.15);
            border: 1px solid rgba(148,163,184,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem; font-weight: 700;
            color: var(--light); margin-top: 2px;
        }

        .tk-step-content { flex: 1; }
        .tk-step-label {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.85rem; color: rgba(255,255,255,0.8);
            margin-bottom: 8px; line-height: 1.5;
        }
        .tk-step-img {
            width: 100%; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            object-fit: contain;
        }
        .tk-step-caption {
            font-family: 'Noto Sans Thai', 'Sarabun', sans-serif;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="background-container">
        <img id="backgroundImage" class="background-image" src="" alt="Background">
        <video id="backgroundVideo" class="background-video" autoplay muted loop playsinline>
            <source src="" type="video/mp4">
        </video>
        <iframe id="backgroundYoutube" class="background-youtube" src="" frameborder="0"
            allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="background-overlay"></div>
    </div>

    <!-- Loading screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <div class="loading-text">กำลังโหลด...</div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="container">

            <div class="hero-wrapper">
                <h1 class="hero-title">
                    <img src="https://raw.githubusercontent.com/wexcea/rbx-scripts/refs/heads/main/assets/Logo-Tittle.png"
                         alt="Wexcea Logo" class="hero-logo">
                    Wexcea
                </h1>

                <div class="game-badges">
                    <div class="game-badge" onclick="openPopup('freefire')">
                        <img src="https://cdn.freefireinfo.net/wp-content/uploads/2021/03/free-fire-icon.png" alt="Free Fire"
                             onerror="this.src='https://img.icons8.com/color/48/free-fire.png'">
                        Free Fire
                    </div>
                    <div class="game-badge" onclick="openPopup('roblox')">
                        <img src="https://cdn2.iconfinder.com/data/icons/metro-ui-icon-set/512/Roblox.png" alt="Roblox"
                             style="filter: grayscale(100%) brightness(1.1);"
                             onerror="this.src='https://img.icons8.com/ios-filled/50/roblox.png'">
                        Roblox
                    </div>
                    <div class="game-badge" onclick="openPopup('minecraft')">
                        <img src="https://cdn2.iconfinder.com/data/icons/metro-ui-icon-set/512/Minecraft.png" alt="Minecraft"
                             onerror="this.src='https://img.icons8.com/color/48/minecraft-logo.png'">
                        Minecraft
                    </div>
                </div>
            </div>

            <div style="margin-top: 40px;"></div>

            <div class="scripts-grid" id="scriptsGrid"></div>
            <div class="no-results" id="noResults" style="display: none;">ไม่พบรายการ</div>

        </div>
    </div>

    <script>
        const scripts = [
            {
                id: 1,
                name: "Donate Link",
                description: "โดเนทตรงนี้ได้เลยนะครับ",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/Donate-logo.gif",
                url: "https://easydonate.app/wexcea"
            },
            {
                id: 2,
                name: "Wexcea Shop",
                description: "ดิสร้านผมเองครับ (เน้นโปรแกรม)",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/discord-logo.png",
                url: "https://discord.gg/6Vv8e3YSU3"
            },
            {
                id: 3,
                name: "My Facebook",
                description: "ติดต่องานตรงนี้เลยครับ",
                logo: "https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/facebook-logo.png",
                url: "https://www.facebook.com/share/14cf7G1rtvh/"
            }
        ];

        function getYouTubeEmbedUrl(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}?autoplay=1&mute=1&loop=1&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&playlist=${match[2]}`;
            }
            return null;
        }

        function initBackground() {
            const style = getComputedStyle(document.documentElement);
            const backgroundType = style.getPropertyValue('--background-type').replace(/['"]/g, '');
            const backgroundUrl  = style.getPropertyValue('--background-url').replace(/['"]/g, '');
            const videoUrl       = style.getPropertyValue('--video-url').replace(/['"]/g, '');
            const youtubeUrl     = style.getPropertyValue('--youtube-url').replace(/['"]/g, '');
            setBackground(
                backgroundType,
                backgroundType === 'youtube' ? youtubeUrl :
                backgroundType === 'video'   ? videoUrl   : backgroundUrl
            );
        }

        function setBackground(type, url) {
            const img = document.getElementById('backgroundImage');
            const vid = document.getElementById('backgroundVideo');
            const yt  = document.getElementById('backgroundYoutube');
            img.style.display = 'none';
            vid.style.display = 'none';
            yt.style.display  = 'none';
            if (type === 'youtube') {
                const embedUrl = getYouTubeEmbedUrl(url);
                if (embedUrl) { yt.style.display = 'block'; yt.src = embedUrl; }
                else { img.style.display = 'block'; img.src = getComputedStyle(document.documentElement).getPropertyValue('--background-url').replace(/['"]/g, ''); }
            } else if (type === 'video') {
                vid.style.display = 'block';
                vid.src = url; vid.loop = true; vid.muted = true; vid.autoplay = true; vid.playsInline = true;
            } else {
                img.style.display = 'block'; img.src = url;
            }
        }

        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 800);
        }

        function renderScripts(list) {
            const grid      = document.getElementById('scriptsGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML  = '';
            if (list.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            list.forEach(script => {
                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <img src="${script.logo}" alt="${script.name}" class="script-logo">
                    <div class="script-info">
                        <div class="script-name">${script.name}</div>
                        <div class="script-description">${script.description}</div>
                    </div>
                    <button class="arrow-button" onclick="viewScript(${script.id})">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                            <path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/>
                        </svg>
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function viewScript(id) {
            const script = scripts.find(s => s.id === id);
            if (script && script.url) window.location.href = script.url;
        }

        const gameData = {
            freefire: {
                name: 'Free Fire',
                icon: 'https://cdn.freefireinfo.net/wp-content/uploads/2021/03/free-fire-icon.png',
                iconFallback: 'https://img.icons8.com/color/96/free-fire.png',
                rows: [{ label: 'UID', value: '9148821686' }],
                note: 'แอดมาได้นะครับ (รับมั้ง)'
            },
            roblox: {
                name: 'Roblox',
                icon: 'https://cdn2.iconfinder.com/data/icons/metro-ui-icon-set/512/Roblox.png',
                iconFallback: 'https://img.icons8.com/ios-filled/96/roblox.png',
                iconStyle: 'filter: grayscale(100%) brightness(1.1);',
                rows: [{ label: 'ชื่อไอดี', value: 'GEXCEA' }],
                note: 'ฝากกดติดตามด้วยนะครับ'
            },
            minecraft: {
                name: 'Minecraft',
                icon: 'https://cdn2.iconfinder.com/data/icons/metro-ui-icon-set/512/Minecraft.png',
                iconFallback: 'https://img.icons8.com/color/96/minecraft-logo.png',
                rows: [{ label: 'ชื่อไอดี', value: 'WEXCEA' }],
                note: 'แอดมาได้ครับ (รับมั้ง)'
            }
        };

        function openPopup(game) {
            const data = gameData[game];
            if (!data) return;
            const img = document.getElementById('popupIcon');
            img.src = data.icon;
            img.style.cssText = data.iconStyle || '';
            img.onerror = () => { img.src = data.iconFallback; img.onerror = null; };
            document.getElementById('popupGameName').textContent = data.name;
            let html = '';
            data.rows.forEach(r => {
                html += `<div class="popup-row"><span class="popup-label">${r.label}</span><span class="popup-value">${r.value}</span></div>`;
            });
            if (data.note) html += `<div class="popup-note">${data.note}</div>`;
            document.getElementById('popupBody').innerHTML = html;
            document.getElementById('popupOverlay').classList.add('active');
        }

        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('active');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

        /* ── Browser detection ───────────────────────── */
        function isTikTok() {
            const ua = navigator.userAgent;
            return /TikTok|trill|musical_ly|BytedanceWebview|ByteLocale|Bytedance/.test(ua);
        }

        function isSupportedBrowser() {
            const ua = navigator.userAgent;
            const isChrome  = /Chrome\//.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);
            const isFirefox = /Firefox\//.test(ua);
            const isEdge    = /Edg\//.test(ua);
            const isSafari  = /Safari\//.test(ua) && !/Chrome\//.test(ua);
            const isInApp   = /FBAN|FBAV|Instagram|Line|Twitter|Snapchat|MicroMessenger|TikTok|trill|musical_ly|BytedanceWebview|ByteLocale|Bytedance/.test(ua);
            if (isInApp) return false;
            return isChrome || isFirefox || isEdge || isSafari;
        }

        function copyUrl() {
            navigator.clipboard.writeText('https://wexcea.github.io/').then(() => {
                const btn = document.getElementById('bwCopyBtn');
                btn.textContent = 'คัดลอกแล้ว!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'คัดลอก'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = 'https://wexcea.github.io/';
                document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
                const btn = document.getElementById('bwCopyBtn');
                btn.textContent = 'คัดลอกแล้ว!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'คัดลอก'; btn.classList.remove('copied'); }, 2000);
            });
        }

        function openBrowser(type) {
            // Copy URL then let href try to open the app
            copyUrl();
            return true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initBackground();
            setTimeout(() => {
                if (isTikTok()) {
                    // โชว์หน้าเว็บก่อน 2 วิ แล้วค่อย fade overlay
                    hideLoading();
                    renderScripts(scripts);
                    setTimeout(() => {
                        document.getElementById('tiktokWarning').classList.add('active');
                        document.getElementById('tkArrow').classList.add('visible');
                    }, 2000);
                } else {
                    hideLoading();
                    renderScripts(scripts);
                }
            }, 600);
        });
    </script>
    <!-- Game popup modal -->
    <div class="popup-overlay" id="popupOverlay" onclick="closePopup()">
        <div class="popup-card" onclick="event.stopPropagation()">
            <button class="popup-close" onclick="closePopup()">✕</button>
            <div class="popup-icon-wrap">
                <img id="popupIcon" src="" alt="">
            </div>
            <div class="popup-game-name" id="popupGameName"></div>
            <div class="popup-body" id="popupBody"></div>
        </div>
    </div>
    <!-- ลูกศรแดงชี้ปุ่ม ··· แยกออกมาเป็น fixed element -->
    <div class="tk-arrow" id="tkArrow">
        <div class="tk-arrow-text">
            กดแถวๆ นี้ครับผม<br>
            <span style="font-weight:500;font-size:0.72rem;opacity:0.75;">(โหมดมืดลองกดมั่วๆ เผื่อเจอ)</span>
        </div>
        <svg viewBox="0 0 20 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 46 L10 6 M10 6 L3 16 M10 6 L17 16" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- TikTok step-by-step popup -->
    <div class="tiktok-warning" id="tiktokWarning">
        <div class="tk-card">
            <div class="tk-header">
                <div class="tk-tiktok-icon">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/tiktok.svg"
                         style="filter: invert(1);"
                         onerror="this.src='https://cdn.worldvectorlogo.com/logos/tiktok-icon-2.svg'">
                </div>
                <div class="tk-header-text">
                    <div class="tk-header-title">เปิดในบราวเซอร์ภายนอก</div>
                    <div class="tk-header-sub">TikTok browser ไม่รองรับ กรุณาเปิดด้วยบราวเซอร์ปกติ</div>
                </div>
            </div>
            <div class="tk-body">
                <div class="tk-desc">ทำตามขั้นตอนด้านล่างเพื่อเปิดในบราวเซอร์ภายนอก</div>
                <div class="tk-steps">
                    <div class="tk-step">
                        <div class="tk-step-num">1</div>
                        <div class="tk-step-content">
                            <div class="tk-step-label">แตะที่ปุ่ม <b style="color:var(--light)">···</b> มุมขวาบน</div>
                            <img class="tk-step-img"
                                 src="https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/step1.png"
                                 alt="Step 1">
                        </div>
                    </div>
                    <div class="tk-step">
                        <div class="tk-step-num">2</div>
                        <div class="tk-step-content">
                            <div class="tk-step-label">เลือก <b style="color:var(--light)">เปิดในเบราว์เซอร์</b></div>
                            <img class="tk-step-img"
                                 src="https://raw.githubusercontent.com/wexcea/wexcea.github.io/refs/heads/main/assets/Map-logo/step2.png"
                                 alt="Step 2">
                            <div class="tk-step-caption">ขอบคุณครับ 🙏</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
